version: 2

models:
  - name: int_job_categories
    description: >
      Una fila por (job, categoría, snapshot_date). Explota el array de
      categorías de todas las fuentes (Himalayas, RemoteOK) para poder
      contar cada categoría por separado. Todas las fuentes se unifican
      aquí gracias a que el staging normaliza 'tags'/'categories' al
      mismo nombre.
    columns:
      - name: source_job_id
        tests: [not_null]
      - name: snapshot_date
        tests: [not_null]
      - name: category
        tests: [not_null]